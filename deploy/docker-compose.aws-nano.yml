services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=1MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=20
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - no
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - noeviction

  api:
    image: ghcr.io/${GHCR_OWNER}/goodjob-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - ./.env.prod
    ports:
      - '80:3000'

volumes:
  pgdata:
