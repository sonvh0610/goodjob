name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  build-and-push-api-image:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.owner.outputs.owner_lc }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Normalize GHCR owner
        id: owner
        shell: bash
        run: |
          echo "owner_lc=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute image tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-api:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/goodjob-api:latest

  deploy-api-to-ec2:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: build-and-push-api-image
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API stack via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_OWNER: ${{ needs.build-and-push-api-image.outputs.owner_lc }}
          IMAGE_TAG: ${{ needs.build-and-push-api-image.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          envs: GHCR_OWNER,IMAGE_TAG,GHCR_USERNAME,GHCR_READ_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_DEPLOY_PATH }}"

            if [ -d .git ]; then
              git fetch --all --prune
              git checkout main
              git pull --ff-only origin main
            fi

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              COMPOSE="docker compose"
            fi

            if [ -f deploy/docker-compose.aws-nano.yml ]; then
              COMPOSE_FILE="deploy/docker-compose.aws-nano.yml"
            elif [ -f docker-compose.yml ]; then
              COMPOSE_FILE="docker-compose.yml"
            else
              echo "No compose file found in ${PWD}" >&2
              exit 1
            fi

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            $COMPOSE --env-file .env.prod -f "$COMPOSE_FILE" pull api
            $COMPOSE --env-file .env.prod -f "$COMPOSE_FILE" up -d postgres redis
            sleep 8
            $COMPOSE --env-file .env.prod -f "$COMPOSE_FILE" run --rm api node apps/api/dist/apps/api/src/app/db/migrate.js
            $COMPOSE --env-file .env.prod -f "$COMPOSE_FILE" up -d api

            docker image prune -f

  deploy-web-to-vercel:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    needs: build-and-push-api-image
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy web to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm exec nx run @org/web:build
          npx vercel@latest deploy apps/web/dist --prod --public --yes --token="$VERCEL_TOKEN"
