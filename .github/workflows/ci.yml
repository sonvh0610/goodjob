name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  main:
    runs-on: ubuntu-latest
    env:
      NX_DAEMON: 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Set Nx SHAs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            NX_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            NX_BASE_SHA="${{ github.event.before }}"
          fi

          if [ -z "$NX_BASE_SHA" ] || [ "$NX_BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            NX_BASE_SHA="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"
          fi

          echo "NX_BASE=$NX_BASE_SHA" >> "$GITHUB_ENV"
          echo "NX_HEAD=${GITHUB_SHA}" >> "$GITHUB_ENV"

      - run: npm exec nx format:check -- --base="$NX_BASE" --head="$NX_HEAD"
      - run: npm exec nx affected -- --targets=typecheck,test,build --base="$NX_BASE" --head="$NX_HEAD" --parallel=3
